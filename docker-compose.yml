version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ethiocode_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ethiocode_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ethiocode_backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"
    networks:
      - ethiocode_net

  frontend:
    image: nginx:alpine
    container_name: ethiocode_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - ethiocode_net

volumes:
  postgres_data:
    driver: local

networks:
  ethiocode_net:
    driver: bridge
